<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna Garment Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="logo.css">
</head>
<body>

    <header>
        <nav class="navbar">
             <div class="logo-container">
                <img src="v fashion hub logo2.jpg" alt="V Fashion Hub Logo" class="site-logo">
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Collection</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Naya Style, Nayi Pehchan</h1>
        <p>Best quality kapde ab aapke budget mein.</p>
    </section>

    <main>
        <h2 class="section-title">Hamare Latest Kapde</h2>
        <div class="product-container">
            
            <div class="product-card">
                <img src="shirt1.jpeg" alt="Shirt">
                <h3>Olive Green Shirt</h3>
                <p>₹999</p>
                <button class="your-button-class" onclick="openForm()">Buy Now</button>
            </div>

            <div class="product-card">
                <img src="pant2.jpeg" alt="Jeans">
                <h3>Black Straight Fit Jeans</h3>
                <p>₹1,299</p>
                <button class="buy-btn">Buy Now</button>
            </div>

            <div class="product-card">
                <img src="tshirt1.jpeg" alt="T-Shirt">
                <h3>Classic White Tee</h3>
                <p>₹499</p>
                <button class="buy-btn">Buy Now</button>
            </div>

            <div class="product-card">
                <img src="shirt3.jpeg" alt="White-SHIRT">
                <h3>Classic White shirt</h3>
                <p>₹499</p>
                <button class="buy-btn">Buy Now</button>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Vikas Store. All Rights Reserved.</p>
    </footer>
<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeForm()">&times;</span>
        <h2>Order Details</h2>
        <form id="deliveryForm" onsubmit="confirmOrder(event)">
            
            <div class="form-group">
                <label for="name">Aapka Naam (Full Name):</label>
                <input type="text" id="name" required placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" required placeholder="Enter your email address">
            </div>
            
            <div class="form-group">
                <label for="phone">Mobile Number:</label>
                <input type="tel" id="phone" required pattern="[0-9]{10}" placeholder="10-digit mobile number">
            </div>
            
            <div class="form-group">
                <label for="address">Delivery Address:</label>
                <textarea id="address" required rows="3" placeholder="Complete address with pincode"></textarea>
            </div>
            
            <div class="form-group">
                <label for="payment">Payment Method:</label>
                <select id="payment" required>
                    <option value="" disabled selected>Select Payment Method</option>
                    <option value="cod">Cash on Delivery (COD)</option>
                    <option value="upi">UPI (GPay, PhonePe, Paytm)</option>
                    <option value="card">Credit / Debit Card</option>
                </select>
            </div>
            
            <button type="submit" class="submit-order-btn">Order Confirm Karein</button>
        </form>
    </div>
</div>

<script>
    function openForm() {
        document.getElementById("orderModal").style.display = "flex";
    }

    function closeForm() {
        document.getElementById("orderModal").style.display = "none";
    }

    function confirmOrder(event) {
        event.preventDefault();
        
        // Form se customer ki details nikalna
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let phone = document.getElementById("phone").value;
        let address = document.getElementById("address").value;
        let paymentMethod = document.getElementById("payment").value;
        
        let paymentText = "";
        if(paymentMethod === "cod") paymentText = "Cash on Delivery (COD)";
        if(paymentMethod === "upi") paymentText = "UPI (GPay/PhonePe/Paytm)";
        if(paymentMethod === "card") paymentText = "Credit/Debit Card";

        // YAHAN APNA REAL WHATSAPP NUMBER DAALEIN (Jaise: 919876543210)
        let myWhatsAppNumber = "917096254826"; 

        // WhatsApp par jaane wala message format
        let message = "New Order Received! 🎉\n\n" +
                      "Customer Name: " + name + "\n" +
                      "Email: " + email + "\n" +
                      "Mobile: " + phone + "\n" +
                      "Address: " + address + "\n" +
                      "Payment Mode: " + paymentText;

        // Message ko URL format mein convert karna
        let encodedMessage = encodeURIComponent(message);

        // WhatsApp Link generate karna
        let whatsAppUrl = "https://api.whatsapp.com/send?phone=" + myWhatsAppNumber + "&text=" + encodedMessage;
        
        // Naye tab mein WhatsApp open karna
        window.open(whatsAppUrl, '_blank');

        // Form ko close aur reset karna
        closeForm();
        document.getElementById("deliveryForm").reset();
    }

    window.onclick = function(event) {
        let modal = document.getElementById("orderModal");
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>
</body>
</html>
